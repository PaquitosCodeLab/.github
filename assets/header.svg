<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b400ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="#0a0a0f" rx="10"/>
  <rect width="800" height="200" fill="url(#headerGrad)" rx="10"/>

  <!-- Grid lines -->
  <g opacity="0.1" stroke="#00f0ff">
    <line x1="0" y1="40" x2="800" y2="40" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke-width="0.5"/>
  </g>

  <!-- Scan line effect -->
  <rect width="800" height="1" y="65" fill="#00f0ff" opacity="0.15"/>
  <rect width="800" height="1" y="135" fill="#ff00aa" opacity="0.15"/>

  <!-- Border glow -->
  <rect x="1" y="1" width="798" height="198" rx="10" fill="none"
        stroke="#00f0ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>

  <!-- Corner accents -->
  <path d="M10,2 L2,2 L2,10" fill="none" stroke="#ff00aa" stroke-width="2" opacity="0.8"/>
  <path d="M790,2 L798,2 L798,10" fill="none" stroke="#ff00aa" stroke-width="2" opacity="0.8"/>
  <path d="M10,198 L2,198 L2,190" fill="none" stroke="#ff00aa" stroke-width="2" opacity="0.8"/>
  <path d="M790,198 L798,198 L798,190" fill="none" stroke="#ff00aa" stroke-width="2" opacity="0.8"/>

  <!-- Org name -->
  <text x="400" y="85" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="36" font-weight="bold" fill="#00f0ff" filter="url(#glowStrong)">
    PaquitosCodeLab
  </text>

  <!-- Tagline -->
  <text x="400" y="120" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="14" fill="#8888aa">
    // building the future, one commit at a time
  </text>

  <!-- Status bar -->
  <text x="20" y="175" font-family="'Courier New', monospace" font-size="10" fill="#39ff14">
    &#9679; SYSTEMS ONLINE
  </text>
  <text x="780" y="175" text-anchor="end" font-family="'Courier New', monospace"
        font-size="10" fill="#8888aa">
    Last scan: 2026-04-14 05:30 UTC
  </text>
</svg>