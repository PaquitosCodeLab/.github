<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800" height="245" viewBox="0 0 800 245">
  <defs>
    <linearGradient id="cardGrad-LatitudWeb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#b400ff;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="245" fill="#12121a" rx="8"/>
  <rect width="800" height="245" fill="url(#cardGrad-LatitudWeb)" rx="8"/>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="243" rx="8" fill="none"
        stroke="#00f0ff" stroke-width="1" opacity="0.4"/>

  <!-- Header -->
  <text x="30" y="40" font-family="'Courier New', monospace" font-size="22" font-weight="bold"
        fill="#00f0ff" filter="url(#cardGlow)">
    🌐 Latitud Web
  </text>
  <text x="30" y="65" font-family="'Courier New', monospace" font-size="12"
        fill="#8888aa">
    Web products — landings, rental management, finance tools
  </text>

  <!-- Divider -->
  <line x1="30" y1="75" x2="770" y2="75" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>

  
    <g transform="translate(30, 95)">
      <text font-family="'Courier New', monospace" font-size="11" fill="#00f0ff">
        <tspan>&#9733; 0</tspan>
        <tspan dx="20">&#9741; 0</tspan>
        <tspan dx="20">&#9888; 0 issues</tspan>
        <tspan dx="20">&#9658; 0 PRs</tspan>
        <tspan dx="20">&#9776; 0 repos</tspan>
      </text>
    </g>

  <!-- Divider -->
  <line x1="30" y1="115" x2="770" y2="115" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Repo header -->
  <text x="30" y="135" font-family="'Courier New', monospace" font-size="10" fill="#8888aa">
    REPOSITORY                               LANGUAGE        PRs        UPDATED
  </text>

  

  <!-- Language bar -->
  
  

  
  
</svg>